version: '3.8'

services:
  textil-pos-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://fmfmm2sc-8080.brs.devtunnels.ms}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://fmfmm2sc-8080.brs.devtunnels.ms}
    container_name: textil-pos-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://fmfmm2sc-8080.brs.devtunnels.ms}
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-https://fmfmm2sc-8080.brs.devtunnels.ms}
      - BACKEND_URL=${BACKEND_URL:-https://fmfmm2sc-8080.brs.devtunnels.ms}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-https://fmfmm2sc-8080.brs.devtunnels.ms}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - textil-pos-network

networks:
  textil-pos-network:
    driver: bridge
