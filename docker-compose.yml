version: '3.8'

services:
  textil-pos-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: textil-pos-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - textil-pos-network

networks:
  textil-pos-network:
    driver: bridge
