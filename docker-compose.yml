version: '3.8'

services:
  textil-pos-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.kiments.tech
        NEXT_PUBLIC_BACKEND_URL: https://api.kiments.tech

    container_name: textil-pos-frontend

    ports:
      - "3000:3000"

    env_file:
      - .env

    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.kiments.tech
      - NEXT_PUBLIC_BACKEND_URL=https://api.kiments.tech
      - BACKEND_URL=https://api.kiments.tech
      - BACKEND_PUBLIC_URL=https://api.kiments.tech

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - textil-pos-network

networks:
  textil-pos-network:
    driver: bridge
